<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, pageSubtitle, activePage, headExtra, pageActions, content, scripts)">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${pageTitle} + ' — SkillMatrix'">SkillMatrix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
  <th:block th:replace="${headExtra}"></th:block>
</head>
<body>

<!-- Sidebar Navigation -->
<nav class="sidebar">
  <div class="sidebar-header">
    <span class="logo-mark">◈</span>
    <div>
      <span class="logo-text">SkillMatrix</span>
      <span class="logo-sub">OKSM Platform</span>
    </div>
  </div>

  <div class="sidebar-section">
    <span class="sidebar-label">ÜBERSICHT</span>
    <a th:href="@{/dashboard}" class="nav-item" th:classappend="${activePage == 'dashboard'} ? 'active'">
      <span class="nav-icon">▦</span> Dashboard
    </a>
  </div>

  <!-- Engineer links -->
  <div class="sidebar-section" sec:authorize="hasAnyRole('ENGINEER','MANAGER','ADMIN')">
    <span class="sidebar-label">ENGINEER</span>
    <a th:href="@{/engineer/skills}" class="nav-item" th:classappend="${activePage == 'my-skills'} ? 'active'">
      <span class="nav-icon">◉</span> Meine Skills
    </a>
    <a th:href="@{/teams}" class="nav-item" th:classappend="${activePage == 'teams'} ? 'active'">
      <span class="nav-icon">◈</span> Meine Teams
    </a>
  </div>

  <!-- Manager links -->
  <div class="sidebar-section" sec:authorize="hasAnyRole('MANAGER','ADMIN')">
    <span class="sidebar-label">MANAGER</span>
    <a th:href="@{/manager/matrix}" class="nav-item" th:classappend="${activePage == 'matrix'} ? 'active'">
      <span class="nav-icon">◫</span> Skill Matrix
    </a>
    <a th:href="@{/manager/gaps}" class="nav-item" th:classappend="${activePage == 'gaps'} ? 'active'">
      <span class="nav-icon">△</span> Gap Analyse
    </a>
    <a th:href="@{/products}" class="nav-item" th:classappend="${activePage == 'products'} ? 'active'">
      <span class="nav-icon">⬡</span> Produkte
    </a>
    <a th:href="@{/import}" class="nav-item" th:classappend="${activePage == 'import'} ? 'active'">
      <span class="nav-icon">↑</span> Excel Import
    </a>
    <a th:href="@{/manager/export/excel}" class="nav-item nav-item--export">
      <span class="nav-icon">↓</span> Excel Export
    </a>
  </div>

  <!-- Admin links -->
  <div class="sidebar-section" sec:authorize="hasRole('ADMIN')">
    <span class="sidebar-label">ADMIN</span>
    <a th:href="@{/admin/users}" class="nav-item" th:classappend="${activePage == 'users'} ? 'active'">
      <span class="nav-icon">◎</span> Benutzer
    </a>
    <a th:href="@{/admin/skills}" class="nav-item" th:classappend="${activePage == 'skill-admin'} ? 'active'">
      <span class="nav-icon">✦</span> Skills verwalten
    </a>
  </div>

  <div class="sidebar-footer">
    <a th:href="@{/profile}" class="user-badge user-badge--link"
       th:classappend="${activePage == 'profile'} ? 'user-badge--active'">
      <span class="user-avatar"
            th:text="${#strings.substring(#authentication.name, 0, 1).toUpperCase()}">U</span>
      <div class="user-info">
        <span class="user-name" th:text="${#authentication.name}">username</span>
        <span class="user-role" sec:authorize="hasRole('ADMIN')">Admin</span>
        <span class="user-role" sec:authorize="hasRole('MANAGER') and !hasRole('ADMIN')">Manager</span>
        <span class="user-role" sec:authorize="hasRole('ENGINEER') and !hasRole('MANAGER')">Engineer</span>
      </div>
      <span class="user-edit-icon">✎</span>
    </a>
    <form th:action="@{/logout}" method="post" style="margin:0">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <button type="submit" class="logout-btn">Abmelden</button>
    </form>
  </div>
</nav>

<!-- Main Content -->
<main class="main-content">
  <div class="page-header">
    <div>
      <h1 class="page-title" th:text="${pageTitle}">Seite</h1>
      <p class="page-subtitle" th:text="${pageSubtitle}" th:if="${pageSubtitle != null}">Subtitle</p>
    </div>
    <div class="page-actions">
      <th:block th:replace="${pageActions}"></th:block>
    </div>
  </div>

  <!-- Flash Messages -->
  <div th:if="${success}" class="flash flash--success" th:text="${success}"></div>
  <div th:if="${error}" class="flash flash--error" th:text="${error}"></div>

  <div class="page-body">
    <th:block th:replace="${content}"></th:block>
  </div>
</main>

<script th:src="@{/js/main.js}"></script>
<th:block th:replace="${scripts}"></th:block>
</body>
</html>
