<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(
        ${team.id == null ? 'Neues Team' : 'Team bearbeiten'},
        'Team-Details konfigurieren',
        'teams',
        ~{::headExtra},
        ~{::pageActions},
        ~{::content},
        ~{}
      )}">
<head><th:block th:fragment="headExtra"></th:block></head>
<body>

<th:block th:fragment="pageActions">
  <a th:href="@{/teams}" class="btn btn--outline">&#8592; Abbrechen</a>
</th:block>

<th:block th:fragment="content">
  <div class="card" style="max-width:600px">
    <form th:action="@{/teams/save}" method="post" style="padding:1.5rem">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="id" th:value="${team.id}"/>

      <div class="form-group">
        <label class="form-label">Team-Name *</label>
        <input name="name" type="text" class="form-input" required
               th:value="${team.name}" placeholder="z.B. Platform Team"/>
      </div>

      <div class="form-group">
        <label class="form-label">Beschreibung</label>
        <textarea name="description" class="form-input" rows="2"
                  th:text="${team.description}" placeholder="Kurze Beschreibung des Teams"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Team-Farbe</label>
          <input name="color" type="color" class="form-input"
                 th:value="${team.color ?: '#4F46E5'}" style="height:42px;padding:4px"/>
        </div>
        <div class="form-group">
          <label class="form-label">Manager (optional)</label>
          <select name="managerId" class="form-select">
            <option value="">— Kein Manager —</option>
            <option th:each="mgr : ${allManagers}"
                    th:value="${mgr.id}"
                    th:text="${mgr.fullName}"
                    th:selected="${team.manager != null and team.manager.id == mgr.id}">Mgr</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <a th:href="@{/teams}" class="btn btn--outline">Abbrechen</a>
        <button type="submit" class="btn btn--primary"
                th:text="${team.id == null ? 'Team anlegen' : 'Speichern'}">Speichern</button>
      </div>
    </form>
  </div>
</th:block>
</body>
</html>
