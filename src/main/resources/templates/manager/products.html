<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout('Produkte','Produkte und benoetigte Skills','products',~{},~{::pageActions},~{::content},~{})}">
<head><th:block th:fragment="headExtra"></th:block></head>
<body>

<th:block th:fragment="pageActions">
  <a sec:authorize="hasAnyRole('MANAGER','ADMIN')"
     th:href="@{/products/manage/new}" class="btn btn--primary">+ Neues Produkt</a>
</th:block>

<th:block th:fragment="content">

  <div th:if="${products.empty}" class="empty-state">
    <div class="empty-icon">⬡</div>
    <h3>Keine Produkte</h3>
    <p>Noch keine Produkte angelegt.</p>
  </div>

  <div class="products-grid" th:unless="${products.empty}">
    <div th:each="p : ${products}" class="product-card">
      <div class="product-card-header">
        <div class="product-icon">⬡</div>
        <div class="product-info">
          <h3 class="product-name" th:text="${p.name}">Produkt</h3>
          <div class="product-owner">Owner: <span th:text="${p.owner ?: '—'}">—</span></div>
        </div>
        <div class="product-actions" sec:authorize="hasAnyRole('MANAGER','ADMIN')">
          <a th:href="@{/products/manage/edit/{id}(id=${p.id})}"
             class="btn btn--xs btn--outline">Bearbeiten</a>
          <form th:action="@{/products/manage/toggle/{id}(id=${p.id})}" method="post" style="display:inline">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn--xs btn--danger"
                    onclick="return confirm('Status ändern?')">
              <span th:if="${p.active}">Deaktivieren</span>
              <span th:unless="${p.active}">Aktivieren</span>
            </button>
          </form>
        </div>
      </div>

      <p class="product-desc" th:text="${p.description ?: ''}">Beschreibung</p>

      <div th:if="${!p.requiredSkills.empty}" class="product-skills">
        <div class="product-skills-label">Benötigte Skills:</div>
        <div class="product-skill-tags">
          <span th:each="skill : ${p.requiredSkills}" class="skill-tag"
                th:text="${skill.name}">Skill</span>
        </div>
      </div>
      <div th:if="${p.requiredSkills.empty}" class="product-no-skills">
        Keine Skills zugeordnet
      </div>
    </div>
  </div>

</th:block>
</html>
