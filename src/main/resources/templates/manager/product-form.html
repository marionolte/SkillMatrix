<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(${product.id == null ? 'Neues Produkt' : 'Produkt bearbeiten'},'Produkt-Details und benoetigte Skills','products',~{},~{::pageActions},~{::content},~{::scripts})}">
<head><th:block th:fragment="headExtra"></th:block></head>
<body>

<th:block th:fragment="pageActions">
  <a th:href="@{/products}" class="btn btn--outline">← Zurück</a>
</th:block>

<th:block th:fragment="content">
  <div class="card" style="max-width:800px">
    <form th:action="@{/products/manage/save}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" name="id" th:value="${product.id}"/>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Name *</label>
          <input name="name" type="text" class="form-input" required
                 th:value="${product.name}" placeholder="Produktname"/>
        </div>
        <div class="form-group">
          <label class="form-label">Owner</label>
          <input name="owner" type="text" class="form-input"
                 th:value="${product.owner}" placeholder="Verantwortliche Person"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Beschreibung</label>
        <textarea name="description" class="form-input" rows="3"
                  th:text="${product.description}" placeholder="Kurze Beschreibung des Produkts"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Benötigte Skills</label>
        <div class="skill-checkbox-grid">
          <div th:each="cat : ${categories}" th:with="catSkills=${allSkills.?[category != null and category.id == __${cat.id}__]}" class="skill-check-category">
            <div class="skill-check-cat-header">
              <span th:text="${cat.icon}">🔧</span>
              <span th:text="${cat.name}">Kategorie</span>
            </div>
            <label th:each="skill : ${catSkills}" class="check-label">
              <input type="checkbox" name="skillIds" th:value="${skill.id}"
                     th:checked="${product.requiredSkills.contains(skill)}"/>
              <span th:text="${skill.name}">Skill</span>
            </label>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <a th:href="@{/products}" class="btn btn--outline">Abbrechen</a>
        <button type="submit" class="btn btn--primary">Speichern</button>
      </div>
    </form>
  </div>
</th:block>
<th:block th:fragment="scripts"></th:block>
</html>
