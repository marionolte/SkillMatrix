<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SkillMatrix — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="login-body">

<div class="login-wrapper">
  <div class="login-brand">
    <span class="login-logo">◈</span>
    <h1 class="login-title">SkillMatrix</h1>
    <p class="login-tagline">Skill Management &amp; Gap Analysis</p>
  </div>

  <div class="login-card">
    <h2 class="login-card-title">Anmelden</h2>

    <div th:if="${error}" class="flash flash--error" th:text="${error}"></div>
    <div th:if="${logout}" class="flash flash--success" th:text="${logout}"></div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

      <div class="form-group">
        <label class="form-label" for="username">Benutzername</label>
        <input id="username" name="username" type="text" class="form-input"
               placeholder="username" autocomplete="username" autofocus required/>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Passwort</label>
        <input id="password" name="password" type="password" class="form-input"
               placeholder="••••••••" autocomplete="current-password" required/>
      </div>

      <button type="submit" class="btn btn--primary btn--full">Anmelden</button>
    </form>

    <div class="login-hint">
      <p class="hint-title">Demo-Zugänge</p>
      <div class="hint-grid">
        <div class="hint-row"><span class="hint-user">admin</span><span class="hint-sep">/</span><span class="hint-pass">admin123</span><span class="hint-role role-admin">Admin</span></div>
        <div class="hint-row"><span class="hint-user">manager</span><span class="hint-sep">/</span><span class="hint-pass">manager123</span><span class="hint-role role-manager">Manager</span></div>
        <div class="hint-row"><span class="hint-user">max.mueller</span><span class="hint-sep">/</span><span class="hint-pass">pass123</span><span class="hint-role role-engineer">Engineer</span></div>
        <div class="hint-row"><span class="hint-user">sara.schmidt</span><span class="hint-sep">/</span><span class="hint-pass">pass123</span><span class="hint-role role-engineer">Engineer</span></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
